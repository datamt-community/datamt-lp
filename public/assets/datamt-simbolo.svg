<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 50 300 300" width="400" height="400">
  <defs>
    <linearGradient id="shapeFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#00F2FE"/>
      <stop offset="0.5" stop-color="#4A7FFF"/>
      <stop offset="1" stop-color="#7B2FFF"/>
    </linearGradient>
    <filter id="globalGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!--
      Mask: branco = mostra o circulo preenchido, preto = recorta (lacuna).
      maskUnits="userSpaceOnUse" => coordenadas no sistema do viewBox (50-350).
      O grupo icone usa transform +66,+47.6 e o tronco usa seu proprio transform interno.
    -->
    <mask id="brainCut" maskUnits="userSpaceOnUse" x="50" y="50" width="300" height="300">
      <rect x="50" y="50" width="300" height="300" fill="white"/>

      <!-- arcos do anel como lacunas na borda do circulo -->
      <g transform="matrix(0.941,0,0,0.941,11.8,11.8)">
        <path d="M 295.46,104.54 A 135,135 0 0,1 333.99,183.55"
              fill="none" stroke="black" stroke-width="6" stroke-linecap="round"/>
        <path d="M 335.0,200.0 A 135,135 0 0,1 306.38,283.11"
              fill="none" stroke="black" stroke-width="6" stroke-linecap="round"/>
        <path d="M 295.46,295.46 A 135,135 0 0,1 216.45,333.99"
              fill="none" stroke="black" stroke-width="6" stroke-linecap="round"/>
        <path d="M 200.0,335.0 A 135,135 0 0,1 135.58,318.64 L 140.79,300.91 L 127.86,314.11 A 135,135 0 0,1 116.89,306.38"
              fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 104.54,295.46 A 135,135 0 0,1 66.01,216.45"
              fill="none" stroke="black" stroke-width="6" stroke-linecap="round"/>
        <path d="M 65.0,200.0 A 135,135 0 0,1 93.62,122.89"
              fill="none" stroke="black" stroke-width="6" stroke-linecap="round"/>
        <path d="M 200.0,65.0 A 135,135 0 0,1 283.1,93.6"
              fill="none" stroke="black" stroke-width="6" stroke-linecap="round"/>
      </g>

      <g transform="matrix(1,0,0,1,66.022615,59)">

        <!-- contorno externo do cerebro -->
        <path d="M 159 202 L 127 166 L 89 178 L 57 166 L 38 116 L 76 62 L 127 46 L 152 55 L 190 70 L 222 114 L 209 166 L 177 201"
              fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- conexoes primarias -->
        <path d="M 177 201 L 165 152 L 127 114 L 89 130 L 51 140" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M 165 152 L 178 101 L 140 62 L 101 75 L 76 62"  stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M 127 114 L 178 101" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 89 178 L 127 114"  stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 127 166 L 165 152" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 209 166 L 178 101" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 222 114 L 178 101" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- conexoes secundarias tracejadas -->
        <g fill="none" stroke="black" stroke-width="2.5" stroke-dasharray="5 3" stroke-linecap="round">
          <line x1="57"  y1="166" x2="89"  y2="130"/>
          <line x1="38"  y1="116" x2="89"  y2="130"/>
          <line x1="127" y1="46"  x2="140" y2="62"/>
          <line x1="190" y1="70"  x2="178" y2="101"/>
          <line x1="127" y1="166" x2="89"  y2="130"/>
          <line x1="209" y1="166" x2="165" y2="152"/>
          <line x1="152" y1="55"  x2="127" y2="114"/>
        </g>

        <!-- nos do cerebro (circulos pretos = lacunas) -->
        <circle cx="38"  cy="116" r="7"  fill="black"/>
        <circle cx="76"  cy="62"  r="8"  fill="black"/>
        <circle cx="127" cy="46"  r="7"  fill="black"/>
        <circle cx="190" cy="70"  r="8.5" fill="black"/>
        <circle cx="222" cy="114" r="7.5" fill="black"/>
        <circle cx="209" cy="166" r="7"  fill="black"/>
        <circle cx="57"  cy="166" r="7"  fill="black"/>
        <circle cx="89"  cy="130" r="8"  fill="black"/>
        <circle cx="178" cy="101" r="8.5" fill="black"/>
        <circle cx="165" cy="152" r="8.5" fill="black"/>
        <circle cx="89"  cy="178" r="7"  fill="black"/>
        <circle cx="140" cy="62"  r="7"  fill="black"/>
        <!-- no central (maior) -->
        <circle cx="127" cy="114" r="13" fill="black"/>


        <!-- cilindro (banco de dados) -->
        <g transform="matrix(1.02136,0,0,0.992131,-2.775261,-6)">
          <!-- corpo: fundo preto (recorte) -->
          <path d="M 155 210 L 155 254 C 155 262 177 262 177 254 L 177 210"
                fill="black"/>
          <!-- tampa superior -->
          <ellipse cx="166" cy="210" rx="11" ry="5.5" fill="black"/>
          <!-- linhas de segmentacao: cor do circulo (branco no mask) -->
          <path d="M 152 225 A 14 5 0 0 0 180 225" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M 152 240 A 14 5 0 0 0 180 240" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M 152 255.517 A 14 5.5 0 0 0 180 255.517" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <!-- pontos entre segmentacoes -->
          <circle cx="157" cy="220" r="2.5" fill="white"/>
          <circle cx="157" cy="236" r="2.5" fill="white"/>
          <circle cx="157" cy="252" r="2.5" fill="white"/>
        </g>

      </g>
    </mask>
  </defs>

  <!--
    Circulo preenchido com a borda exata do anel-pilares (arcos conectados por linhas retas nos gaps).
    O segmento MT com seu recorte em chevron esta preservado.
    A mask recorta o cerebro + cilindro do interior.
  -->
  <g transform="matrix(0.941,0,0,0.941,11.8,11.8)" mask="url(#brainCut)">
    <g transform="translate(200,200) scale(0.94) translate(-200,-200)">
    <path d="M 199.0,66.0
             A 135,135 0 0,1 283.1,93.6
             L 295.46,104.54
             A 135,135 0 0,1 333.99,183.55
             L 335.0,200.0
             A 135,135 0 0,1 306.38,283.11
             L 295.46,295.46
             A 135,135 0 0,1 216.45,333.99
             L 200.0,335.0
             A 135,135 0 0,1 135.58,318.64
             L 140.79,300.91
             L 127.86,314.11
             A 135,135 0 0,1 116.89,306.38
             L 104.54,295.46
             A 135,135 0 0,1 66.01,216.45
             L 65.0,200.0
             A 135,135 0 0,1 95.99,122.89
             Z"
          fill="url(#shapeFill)"/>
    </g>
  </g>

  <!-- ponto central do cerebro — mesmos transforms do grupo do cerebro -->
  <g transform="matrix(0.941,0,0,0.941,11.8,11.8)">
    <g transform="matrix(1,0,0,1,66.022615,59)">
      <circle cx="127" cy="114" r="7" fill="#4A7FFF" opacity="0.75" filter="url(#globalGlow)"/>
    </g>
  </g>

</svg>
